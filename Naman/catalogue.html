<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page">
        <div class="card">
            <h2>Book Catalogue</h2>

            <table>
                <tr>
                    <th>Cover</th>
                    <th>Book Name</th>
                    <th>Author</th>
                    <th>Publisher</th>
                    <th>Price</th>
                    <th>Cart</th>
                </tr>

                <tr>
                    <td><img class="bookimg" src="images/book_dsa.jpg" alt="DSA Book"></td>
                    <td><b>Data Structure and Algorithm</b></td>
                    <td>Narasimha Karumanchi</td>
                    <td>CareerMonk</td>
                    <td><span class="price">₹699</span></td>
                    <td><button>Add to Cart</button></td>
                </tr>

                <tr>
                    <td><img class="bookimg" src="images/book_ece.jpg" alt="ECE Book"></td>
                    <td><b>Microelectronic Circuits</b></td>
                    <td>Sedra & Smith</td>
                    <td>Oxford University Press</td>
                    <td><span class="price">₹799</span></td>
                    <td><button>Add to Cart</button></td>
                </tr>

                <tr>
                    <td><img class="bookimg" src="images/book_ml.jpg" alt="ML Book"></td>
                    <td><b>Training ML Models</b></td>
                    <td>Aurélien Géron</td>
                    <td>O'Reilly</td>
                    <td><span class="price">₹899</span></td>
                    <td><button>Add to Cart</button></td>
                </tr>
            </table>
        </div>
    </div>
</body>
</html>
