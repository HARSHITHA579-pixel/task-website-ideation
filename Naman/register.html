<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Registration Form</h2>

        <form>
            Name:
            <input type="text" placeholder="Your full name">

            Password:
            <input type="password" placeholder="Create password">

            Email:
            <input type="email" placeholder="example@gmail.com">

            Phone Number:
            <input type="text" placeholder="10-digit number">

            Sex:<br>
            <input type="radio" name="sex"> Male
            <input type="radio" name="sex"> Female
            <br><br>

            Date of Birth:<br>
            <select>
                <option>Day</option>
                <option>1</option><option>2</option><option>3</option>
                <option>4</option><option>5</option><option>6</option>
                <option>7</option><option>8</option><option>9</option>
                <option>10</option><option>11</option><option>12</option>
                <option>13</option><option>14</option><option>15</option>
                <option>16</option><option>17</option><option>18</option>
                <option>19</option><option>20</option><option>21</option>
                <option>22</option><option>23</option><option>24</option>
                <option>25</option><option>26</option><option>27</option>
                <option>28</option><option>29</option><option>30</option>
                <option>31</option>
            </select>

            <select>
                <option>Month</option>
                <option>Jan</option><option>Feb</option><option>Mar</option>
                <option>Apr</option><option>May</option><option>Jun</option>
                <option>Jul</option><option>Aug</option><option>Sep</option>
                <option>Oct</option><option>Nov</option><option>Dec</option>
            </select>

            <select>
                <option>Year</option>
                <option>2000</option><option>2001</option><option>2002</option>
                <option>2003</option><option>2004</option><option>2005</option>
                <option>2006</option><option>2007</option><option>2008</option>
                <option>2009</option><option>2010</option>
            </select>
            <br><br>

            Languages Known:<br>
            <input type="checkbox"> English
            <input type="checkbox"> Telugu
            <input type="checkbox"> Hindi
            <input type="checkbox"> Tamil
            <br><br>

            Address:
            <textarea rows="4" placeholder="Enter address..."></textarea>

            <input type="submit" value="Register">
        </form>
    </div>
</body>
</html>
